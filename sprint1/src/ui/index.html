<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Messenger — EECE/CS 3093C Lab 1</title>
  <script src="/socket.io/socket.io.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.2.7/purify.min.js"
  integrity="sha512-78KH17QLT5e55GJqP76vutp1D2iAoy06WcYBXB6iBCsmO6wWzx0Qdg8EDpm8mKXv68BcvHOyeeP4wxAL0twJGQ=="
  crossorigin="anonymous" referrerpolicy="no-referrer"></script>
</head>

<body>

  <h1>Simple Messenger — EECE/CS 3093C Lab 1</h1>

  <br>

  <b>
    <div id="welcome"></div>
  </b>

  <br>

  <div>
    Chat message:
    <input id="chat-message" type="text" autocomplete="off" placeholder="Type a message…" style="width:450px;" />
    <button id="send-button">Send</button>
  </div>

  <br>

  <div>
    Private message:
    <input id="private-username" type="text" autocomplete="off" placeholder="Type a username…" style="width:150px;" />
    <input id="private-message" type="text" autocomplete="off" placeholder="Type a private message…"
      style="width:450px;" />
    <button id="send-private-button">Send</button>
  </div>

  <br>

  <b>System status: </b><br>
  <div id="status" style="width:625px; height:75px; overflow-y:scroll;"></div>
  <b>Chat Responses:</b><br>
  <div id="responses"></div>

  <br>

  <h2>Online Users</h2>
  <ul id="online-users-list"></ul>

  <br>

  <script type="module" src="client.js"></script>
  <script type="module" src="private_client.js"></script>
</body>

</html>
